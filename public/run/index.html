<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Run command — OpenChaw</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 820px;
      margin: 2rem auto;
      padding: 0 1rem;
      color: #222;
    }
    h1 { margin-bottom: .25rem; }
    .lead { color: #666; margin-top: 0; }
    h2 { margin-top: 2rem; border-bottom: 1px solid #eee; padding-bottom: .25rem; }
    h3 { margin: 0 0 .35rem; font-size: .9rem; color: #555; font-weight: 600; }
    code { background: #f5f5f5; padding: .1rem .35rem; border-radius: 3px; font-size: .9em; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      margin-bottom: 1.4rem;
      padding: .4rem .75rem .4rem .55rem;
      font-size: .85rem;
      font-weight: 500;
      color: #666;
      background: transparent;
      border: 1px solid #e5e5e5;
      border-radius: 999px;
      text-decoration: none;
      transition: color .15s, background .15s, border-color .15s, box-shadow .15s;
    }
    .back-link svg {
      width: 14px;
      height: 14px;
      transition: transform .15s;
    }
    .back-link:hover {
      color: #2563eb;
      background: #f5f8ff;
      border-color: #2563eb;
      box-shadow: 0 1px 4px rgba(37, 99, 235, .08);
    }
    .back-link:hover svg {
      transform: translateX(-2px);
    }
    .back-link:active {
      transform: scale(.98);
    }

    .field {
      margin-bottom: 1rem;
    }
    .field label {
      display: block;
      font-size: .8rem;
      color: #666;
      margin-bottom: .35rem;
      font-weight: 500;
      letter-spacing: .01em;
    }
    .field input,
    .field textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: .55rem .7rem;
      font-family: ui-monospace, "SF Mono", Menlo, Monaco, monospace;
      font-size: .9rem;
      color: #222;
      background: white;
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus,
    .field textarea:focus {
      border-color: #2563eb;
    }
    .field textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      gap: .5rem;
      margin: 1rem 0 1.2rem;
    }
    .btn {
      flex: 0 0 auto;
      padding: .5rem 1rem;
      font-family: system-ui, sans-serif;
      font-size: .9rem;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid #ddd;
      background: white;
      color: #222;
      transition: border-color .15s, background .15s, color .15s, transform .06s;
    }
    .btn:hover { border-color: #2563eb; color: #2563eb; }
    .btn:active { transform: scale(.985); }
    .btn.primary {
      border-color: #2563eb;
      background: #2563eb;
      color: white;
    }
    .btn.primary:hover { background: #1e4ec5; border-color: #1e4ec5; color: white; }

    .status-row {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin: 0 0 1.2rem;
      font-size: .85rem;
    }
    .status-row .label {
      color: #666;
      letter-spacing: .01em;
    }
    .pill {
      display: inline-block;
      padding: .15rem .55rem;
      border-radius: 99px;
      font-size: .78rem;
      font-family: ui-monospace, monospace;
      font-weight: 500;
      background: #f5f5f5;
      color: #555;
      border: 1px solid #ddd;
    }
    .pill.pending { background: #fef9c3; color: #713f12; border-color: #fde68a; }
    .pill.running { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; }
    .pill.done    { background: #dcfce7; color: #14532d; border-color: #bbf7d0; }
    .pill.error   { background: #fee2e2; color: #7f1d1d; border-color: #fecaca; }

    .section {
      margin-top: 1rem;
    }
    .section.stderr h3 { color: #b91c1c; }

    .out {
      background: #1c1c1e;
      color: #f5f5f0;
      padding: .85rem 1rem;
      border-radius: 8px;
      overflow-x: auto;
      overflow-y: auto;
      font-family: ui-monospace, "SF Mono", Menlo, Monaco, monospace;
      font-size: .82rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
      max-height: 280px;
    }
    .out.empty { color: #6e6e6e; }
    .section.stderr .out {
      border-left: 3px solid #b91c1c;
    }
  </style>
</head>
<body>
  <a href="/" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12 19 5 12 12 5"/>
    </svg>
    <span>OpenChaw</span>
  </a>
  <h1>Run command</h1>
  <p class="lead">Ejecuta comandos shell en la máquina del worker mediante <code>/api/run</code> (sincrónico, ≤25 s) o <code>/api/jobs</code> (encolar y polear).</p>

  <h2>Comando</h2>

  <div class="field">
    <label for="token">Token</label>
    <input id="token" type="password" placeholder="JOBS_CLIENT_TOKEN" autocomplete="off" />
  </div>

  <div class="field">
    <label for="command">Comando shell</label>
    <textarea id="command" spellcheck="false">uname -a && pwd && ls</textarea>
  </div>

  <div class="actions">
    <button id="run" type="button" class="btn primary">Run</button>
    <button id="enqueue" type="button" class="btn">Enqueue + polling</button>
  </div>

  <div class="status-row">
    <span class="label">status</span>
    <span id="status" class="pill">idle</span>
  </div>

  <h2>Output</h2>

  <div class="section">
    <h3>stdout</h3>
    <pre id="stdout" class="out empty">—</pre>
  </div>

  <div class="section stderr">
    <h3>stderr</h3>
    <pre id="stderr" class="out empty">—</pre>
  </div>

  <div class="section">
    <h3>meta</h3>
    <pre id="meta" class="out empty">—</pre>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const tokenInput = $("token");
    tokenInput.value = localStorage.getItem("JOBS_CLIENT_TOKEN") || "";
    tokenInput.addEventListener("change", () => {
      localStorage.setItem("JOBS_CLIENT_TOKEN", tokenInput.value.trim());
    });

    const setStatus = (s) => {
      const el = $("status");
      el.textContent = s || "idle";
      el.className = "pill " + (s || "");
    };
    const setOut = (id, val) => {
      const el = $(id);
      const v = (val ?? "").toString();
      el.textContent = v.length ? v : "—";
      el.classList.toggle("empty", !v.length);
    };
    const reset = () => {
      setStatus("");
      setOut("stdout", "");
      setOut("stderr", "");
      setOut("meta", "");
    };
    const render = (job) => {
      setStatus(job.status);
      setOut("stdout", job.stdout);
      setOut("stderr", job.stderr);
      setOut("meta", JSON.stringify(
        { id: job.id, exitCode: job.exitCode, durationMs: job.durationMs, error: job.error },
        null, 2
      ));
    };

    const headers = () => ({
      "Content-Type": "application/json",
      "Authorization": "Bearer " + tokenInput.value.trim(),
    });

    $("run").addEventListener("click", async () => {
      reset();
      setStatus("running");
      try {
        const res = await fetch("/api/run", {
          method: "POST",
          headers: headers(),
          body: JSON.stringify({ command: $("command").value }),
        });
        const data = await res.json();
        if (!res.ok) {
          setStatus("error");
          setOut("stderr", JSON.stringify(data, null, 2));
          return;
        }
        if (data.status === "pending" || data.status === "running") {
          setOut("meta", "Sigue corriendo. id=" + data.id + " — usa 'Enqueue + polling' o consulta /api/jobs/" + data.id);
          setStatus(data.status);
          return;
        }
        render(data);
      } catch (err) {
        setStatus("error");
        setOut("stderr", err.message);
      }
    });

    $("enqueue").addEventListener("click", async () => {
      reset();
      setStatus("pending");
      try {
        const r1 = await fetch("/api/jobs", {
          method: "POST",
          headers: headers(),
          body: JSON.stringify({ command: $("command").value }),
        });
        const j1 = await r1.json();
        if (!r1.ok) {
          setStatus("error");
          setOut("stderr", JSON.stringify(j1, null, 2));
          return;
        }
        const id = j1.id;
        setOut("meta", "id=" + id + " — polling cada 1s...");
        const deadline = Date.now() + 60_000;
        while (Date.now() < deadline) {
          await new Promise((r) => setTimeout(r, 1000));
          const r2 = await fetch("/api/jobs/" + id, { headers: headers() });
          const j2 = await r2.json();
          if (!r2.ok) {
            setStatus("error");
            setOut("stderr", JSON.stringify(j2, null, 2));
            return;
          }
          const job = j2.job;
          setStatus(job.status);
          if (job.status === "done" || job.status === "error") {
            render(job);
            return;
          }
        }
        setStatus("error");
        setOut("stderr", "Timeout en polling tras 60s");
      } catch (err) {
        setStatus("error");
        setOut("stderr", err.message);
      }
    });
  </script>
</body>
</html>
