<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Outpost Chat</title>
  <style>
    :root {
      --bg: #f4f3ee;
      --bg-elev: #faf9f5;
      --surface: #ffffff;
      --border: #e8e6dd;
      --border-strong: #d4d1c3;
      --text: #1f1e1b;
      --text-mute: #6b685e;
      --text-faint: #9c9889;
      --accent: #c96442;
      --accent-soft: #e9b29c;
      --user-bubble: #ebe9df;
      --danger: #c14a3b;
      --ui: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", "Helvetica Neue", system-ui, sans-serif;
      --serif: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
      --mono: ui-monospace, "SF Mono", Menlo, Monaco, "JetBrains Mono", monospace;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.10);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--ui);
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: row;
    }

    /* ───── Sidebar ───── */
    .sidebar {
      width: 270px;
      flex-shrink: 0;
      background: #efeee5;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: sticky;
      top: 0;
      transition: transform .25s ease-out;
    }
    .sidebar-header {
      padding: .9rem .85rem;
      border-bottom: 1px solid var(--border);
    }
    .new-chat-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: .55rem;
      padding: .6rem .8rem;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 9px;
      color: var(--text);
      font-family: var(--ui);
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .12s, border-color .12s;
    }
    .new-chat-btn:hover { background: #fffdf6; border-color: var(--accent); }
    .new-chat-btn svg { width: 16px; height: 16px; }
    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: .5rem .5rem 1rem;
    }
    .chat-section-label {
      font-size: .68rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-faint);
      padding: .8rem .65rem .35rem;
      font-weight: 600;
    }
    .chat-empty {
      padding: 1rem .8rem;
      color: var(--text-faint);
      font-size: .85rem;
      text-align: center;
    }
    .chat-item {
      display: flex;
      align-items: center;
      gap: .35rem;
      padding: .55rem .65rem;
      margin-bottom: 2px;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text);
      font-size: .89rem;
      line-height: 1.3;
      transition: background .12s;
      position: relative;
    }
    .chat-item:hover { background: rgba(0, 0, 0, 0.05); }
    .chat-item.active { background: rgba(201, 100, 66, 0.10); color: var(--text); }
    .chat-item.active .chat-item-title { font-weight: 500; }
    .chat-item-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .chat-delete {
      width: 22px; height: 22px;
      border: 0;
      background: transparent;
      color: var(--text-faint);
      cursor: pointer;
      border-radius: 5px;
      display: grid;
      place-items: center;
      opacity: 0;
      transition: opacity .12s, background .12s, color .12s;
      flex-shrink: 0;
    }
    .chat-item:hover .chat-delete,
    .chat-item.active .chat-delete { opacity: 1; }
    .chat-delete:hover { background: rgba(193, 74, 59, 0.12); color: var(--danger); }
    .chat-delete svg { width: 14px; height: 14px; }
    .sidebar-footer {
      padding: .7rem .85rem;
      border-top: 1px solid var(--border);
    }
    .sidebar-footer .ghost-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
    }
    .sidebar-footer .ghost-btn svg { width: 14px; height: 14px; }
    .sidebar-overlay {
      display: none;
    }

    /* ───── Main column ───── */
    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ───── Header ───── */
    .topbar {
      display: flex;
      align-items: center;
      gap: .8rem;
      padding: .8rem 1.2rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-elev);
      z-index: 5;
      flex-shrink: 0;
    }
    .menu-toggle {
      display: none;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: .55rem;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: -.01em;
    }
    .brand-mark {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: grid;
      place-items: center;
      font-family: var(--serif);
      font-weight: 700;
      font-size: .9rem;
      box-shadow: 0 1px 2px rgba(0,0,0,.15);
    }
    .header-controls {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .select-min {
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-mute);
      font-family: var(--ui);
      font-size: .85rem;
      padding: .35rem 1.6rem .35rem .65rem;
      border-radius: 8px;
      cursor: pointer;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--text-faint) 50%),
        linear-gradient(135deg, var(--text-faint) 50%, transparent 50%);
      background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      transition: background-color .15s, border-color .15s, color .15s;
    }
    .select-min:hover {
      background-color: rgba(0, 0, 0, 0.04);
      color: var(--text);
    }
    .icon-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 0;
      background: transparent;
      color: var(--text-mute);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background .15s, color .15s;
    }
    .icon-btn:hover {
      background: rgba(0, 0, 0, 0.05);
      color: var(--text);
    }
    .icon-btn svg { width: 18px; height: 18px; }

    /* ───── Conversation ───── */
    .conversation {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 1rem 8rem;
      scroll-behavior: smooth;
    }
    .conv-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .msg {
      display: flex;
      gap: .9rem;
      align-items: flex-start;
      animation: fadeIn .25s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .avatar {
      flex: 0 0 auto;
      width: 30px; height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: -.01em;
    }
    .msg-user .avatar {
      background: var(--user-bubble);
      color: var(--text-mute);
      font-family: var(--ui);
    }
    .msg-assistant .avatar {
      background: var(--accent);
      color: #fff;
      font-family: var(--serif);
      font-weight: 700;
    }
    .msg-assistant .avatar svg {
      width: 19px;
      height: 19px;
      display: block;
    }
    .empty .logo-circle svg {
      width: 34px;
      height: 34px;
      display: block;
    }
    .provider-mark {
      display: inline-grid;
      place-items: center;
      width: 22px;
      height: 22px;
      color: var(--accent);
      flex: 0 0 auto;
    }
    .provider-mark svg { width: 20px; height: 20px; display: block; }
    .msg-body {
      flex: 1;
      line-height: 1.65;
      font-size: 1rem;
      word-wrap: break-word;
      padding-top: 4px;
    }
    .msg-assistant .msg-body {
      font-family: var(--serif);
      font-size: 1.04rem;
    }
    .msg-user .msg-body {
      font-family: var(--ui);
      white-space: pre-wrap;
    }
    .msg-error .msg-body {
      color: var(--danger);
      font-size: .9rem;
      font-family: var(--mono);
      background: rgba(193, 74, 59, 0.06);
      border: 1px solid rgba(193, 74, 59, 0.2);
      padding: .6rem .8rem;
      border-radius: 8px;
      white-space: pre-wrap;
    }

    /* ───── Markdown ───── */
    .md > *:first-child { margin-top: 0; }
    .md > *:last-child  { margin-bottom: 0; }
    .md p {
      margin: 0 0 .75em;
    }
    .md h1, .md h2, .md h3, .md h4, .md h5, .md h6 {
      font-family: var(--ui);
      font-weight: 600;
      line-height: 1.3;
      margin: 1.1em 0 .45em;
      letter-spacing: -.005em;
      color: var(--text);
    }
    .md h1 { font-size: 1.4em; }
    .md h2 { font-size: 1.22em; }
    .md h3 { font-size: 1.08em; }
    .md h4 { font-size: 1em; }
    .md h5, .md h6 { font-size: .95em; color: var(--text-mute); }
    .md strong { font-weight: 600; }
    .md em { font-style: italic; }
    .md ul, .md ol {
      padding-left: 1.5em;
      margin: .55em 0;
    }
    .md li { margin: .2em 0; }
    .md li > p { margin: .15em 0; }
    .md a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .md a:hover { color: #b15839; }
    .md blockquote {
      margin: .6em 0;
      padding: .15em 1em;
      border-left: 3px solid var(--border-strong);
      color: var(--text-mute);
    }
    .md code.md-inline {
      background: rgba(28, 25, 23, 0.06);
      padding: .12em .35em;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: .88em;
      border: 1px solid rgba(28, 25, 23, 0.04);
    }
    .md pre.md-code {
      background: #1f1c19;
      color: #f1efe8;
      border-radius: 10px;
      padding: .85em 1em;
      overflow-x: auto;
      margin: .8em 0;
      line-height: 1.5;
    }
    .md pre.md-code code {
      font-family: var(--mono);
      font-size: .85em;
      background: transparent;
      padding: 0;
      border: 0;
      border-radius: 0;
      color: inherit;
      white-space: pre;
    }
    .md hr {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 1.2em 0;
    }
    .typing-dots {
      display: inline-flex;
      gap: 5px;
      align-items: flex-end;
      padding: .55rem 0 .35rem;
      height: 18px;
    }
    .typing-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-faint);
      display: inline-block;
      animation: typing-bounce 1.25s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .30s; }
    @keyframes typing-bounce {
      0%, 70%, 100% { transform: translateY(0); opacity: .35; }
      35%           { transform: translateY(-5px); opacity: 1; }
    }
    .msg-typing .avatar { animation: avatar-pulse 1.6s infinite ease-in-out; }
    @keyframes avatar-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(201, 100, 66, 0.35); }
      50%      { box-shadow: 0 0 0 6px rgba(201, 100, 66, 0); }
    }

    /* ───── Empty state ───── */
    .empty {
      max-width: 720px;
      margin: 6rem auto 0;
      text-align: center;
      color: var(--text-mute);
    }
    .empty .logo-circle {
      width: 56px; height: 56px;
      margin: 0 auto 1.2rem;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: grid;
      place-items: center;
      font-family: var(--serif);
      font-weight: 700;
      font-size: 1.6rem;
      box-shadow: 0 4px 14px rgba(201, 100, 66, 0.25);
    }
    .empty h2 {
      font-family: var(--serif);
      font-size: 1.7rem;
      font-weight: 500;
      color: var(--text);
      margin: 0 0 .4rem;
      letter-spacing: -.01em;
    }
    .empty p {
      font-size: .95rem;
      margin: 0;
    }

    /* ───── Composer ───── */
    .composer-wrap {
      padding: 1rem 1rem 1.2rem;
      background: linear-gradient(to top, var(--bg) 70%, transparent);
      flex-shrink: 0;
    }
    .composer {
      max-width: 720px;
      margin: 0 auto;
      pointer-events: auto;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 18px;
      padding: .65rem .65rem .55rem .9rem;
      display: flex;
      align-items: flex-end;
      gap: .5rem;
      box-shadow: var(--shadow-lg);
      transition: border-color .15s;
    }
    .composer:focus-within {
      border-color: var(--accent);
    }
    .composer textarea {
      flex: 1;
      border: 0;
      outline: 0;
      resize: none;
      background: transparent;
      font-family: var(--ui);
      font-size: 1rem;
      line-height: 1.5;
      color: var(--text);
      max-height: 220px;
      min-height: 28px;
      padding: .35rem 0;
    }
    .composer textarea::placeholder { color: var(--text-faint); }
    .send-btn {
      flex: 0 0 auto;
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 0;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background .15s, transform .08s, opacity .15s;
    }
    .send-btn:hover { background: #b15839; }
    .send-btn:active { transform: scale(.94); }
    .send-btn:disabled {
      background: var(--border-strong);
      color: var(--text-faint);
      cursor: not-allowed;
    }
    .send-btn svg { width: 16px; height: 16px; }

    .composer-footer {
      max-width: 720px;
      margin: .55rem auto 0;
      font-size: .76rem;
      color: var(--text-faint);
      text-align: center;
      pointer-events: auto;
      min-height: 1.2em;
    }
    .composer-footer .dot { color: var(--text-faint); margin: 0 .35rem; }

    /* ───── Settings panel (drawer) ───── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.25);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s;
      z-index: 20;
    }
    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .drawer {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(380px, 92vw);
      background: var(--bg-elev);
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform .22s ease-out;
      z-index: 30;
      display: flex;
      flex-direction: column;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-header {
      display: flex;
      align-items: center;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
    }
    .drawer-header h3 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      flex: 1;
    }
    .drawer-body {
      padding: 1.2rem;
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }
    .drawer-body label {
      display: flex;
      flex-direction: column;
      gap: .35rem;
    }
    .drawer-body label > span {
      font-size: .72rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-mute);
      font-weight: 500;
    }
    .drawer-body input {
      background: var(--surface);
      border: 1px solid var(--border-strong);
      color: var(--text);
      padding: .55rem .7rem;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: .9rem;
      outline: 0;
      transition: border-color .15s;
    }
    .drawer-body input:focus { border-color: var(--accent); }
    .ghost-btn {
      background: var(--surface);
      border: 1px solid var(--border-strong);
      color: var(--text);
      padding: .55rem .8rem;
      border-radius: 8px;
      font-family: var(--ui);
      font-size: .88rem;
      cursor: pointer;
      transition: background .12s, border-color .12s, color .12s;
    }
    .ghost-btn:hover {
      background: rgba(0, 0, 0, 0.04);
      border-color: var(--border-strong);
    }
    .ghost-btn.danger {
      color: var(--danger);
      border-color: rgba(193, 74, 59, 0.3);
    }
    .ghost-btn.danger:hover {
      background: rgba(193, 74, 59, 0.06);
    }

    /* ───── Scrollbar (subtle) ───── */
    .conversation::-webkit-scrollbar,
    .drawer-body::-webkit-scrollbar {
      width: 8px;
    }
    .conversation::-webkit-scrollbar-thumb,
    .drawer-body::-webkit-scrollbar-thumb {
      background: var(--border-strong);
      border-radius: 4px;
    }

    /* ───── Mobile ───── */
    @media (max-width: 800px) {
      .menu-toggle { display: grid; }
      .sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        z-index: 40;
        transform: translateX(-100%);
        box-shadow: 6px 0 24px rgba(0, 0, 0, 0.15);
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay {
        display: block;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.3);
        opacity: 0;
        pointer-events: none;
        transition: opacity .2s;
        z-index: 35;
      }
      .sidebar-overlay.open {
        opacity: 1;
        pointer-events: auto;
      }
      .topbar { padding: .65rem .8rem; gap: .4rem; }
      .brand { font-size: .92rem; }
      .header-controls { gap: .25rem; }
      .select-min { font-size: .8rem; padding: .3rem 1.4rem .3rem .55rem; }
      .conversation { padding: 1.5rem .8rem 1rem; }
      .empty { margin-top: 4rem; }
      .empty h2 { font-size: 1.4rem; }
      .composer-wrap { padding: .7rem .7rem 1rem; }
    }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" id="newChatBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>Nueva conversación</span>
      </button>
    </div>
    <div class="chat-list" id="chatList"></div>
    <div class="sidebar-footer">
      <button type="button" class="ghost-btn" id="settingsToggleSidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </button>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main">
    <header class="topbar">
      <button class="icon-btn menu-toggle" id="menuToggle" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="brand">
        <span class="provider-mark" id="providerMark"></span>
        <span>Outpost Chat</span>
      </div>
      <div class="header-controls">
        <select id="provider" class="select-min" aria-label="Provider">
          <option value="openai">OpenAI</option>
          <option value="anthropic">Anthropic</option>
        </select>
        <select id="model" class="select-min" aria-label="Model"></select>
      </div>
    </header>

    <main class="conversation" id="conversation">
      <div class="conv-inner" id="messages"></div>
    </main>

    <div class="composer-wrap">
      <form id="form" class="composer">
        <textarea id="input" rows="1" placeholder="Mensaje a Outpost..."></textarea>
        <button type="submit" id="send" class="send-btn" aria-label="Enviar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
      </form>
      <div class="composer-footer">
        <span id="status"></span>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay"></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-header">
      <h3>Settings</h3>
      <button class="icon-btn" id="settingsClose" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="drawer-body">
      <label>
        <span>JOBS_CLIENT_TOKEN</span>
        <input id="token" type="password" autocomplete="off" placeholder="admin" />
      </label>
      <label>
        <span>max tokens</span>
        <input id="maxTokens" type="number" value="2048" min="1" />
      </label>
      <button type="button" id="refreshModels" class="ghost-btn">Refrescar lista de modelos</button>
      <button type="button" id="clear" class="ghost-btn danger">Borrar conversación actual</button>
    </div>
  </aside>

  <script>
    const $ = (id) => document.getElementById(id);
    const tokenInput      = $('token');
    const providerSel     = $('provider');
    const modelSel        = $('model');
    const refreshBtn      = $('refreshModels');
    const maxTokensInput  = $('maxTokens');
    const inputEl         = $('input');
    const messagesEl      = $('messages');
    const conversationEl  = $('conversation');
    const statusEl        = $('status');
    const sendBtn         = $('send');
    const formEl          = $('form');
    const drawerEl        = $('drawer');
    const overlayEl       = $('overlay');

    const DEFAULT_MODELS = {
      openai: 'gpt-4o-mini',
      anthropic: 'claude-opus-4-7',
    };
    const MODELS_URL = {
      openai: 'https://api.openai.com/v1/models',
      anthropic: 'https://api.anthropic.com/v1/models',
    };

    const BRAND_ICONS = {
      anthropic: '<svg viewBox="0 0 100 100" fill="currentColor" aria-hidden="true"><path d="m19.6 66.5 19.7-11 .3-1-.3-.5h-1l-3.3-.2-11.2-.3L14 53l-9.5-.5-2.4-.5L0 49l.2-1.5 2-1.3 2.9.2 6.3.5 9.5.6 6.9.4L38 49.1h1.6l.2-.7-.5-.4-.4-.4L29 41l-10.6-7-5.6-4.1-3-2-1.5-2-.6-4.2 2.7-3 3.7.3.9.2 3.7 2.9 8 6.1L37 36l1.5 1.2.6-.4.1-.3-.7-1.1L33 25l-6-10.4-2.7-4.3-.7-2.6c-.3-1-.4-2-.4-3l3-4.2L28 0l4.2.6L33.8 2l2.6 6 4.1 9.3L47 29.9l2 3.8 1 3.4.3 1h.7v-.5l.5-7.2 1-8.7 1-11.2.3-3.2 1.6-3.8 3-2L61 2.6l2 2.9-.3 1.8-1.1 7.7L59 27.1l-1.5 8.2h.9l1-1.1 4.1-5.4 6.9-8.6 3-3.5L77 13l2.3-1.8h4.3l3.1 4.7-1.4 4.9-4.4 5.6-3.7 4.7-5.3 7.1-3.2 5.7.3.4h.7l12-2.6 6.4-1.1 7.6-1.3 3.5 1.6.4 1.6-1.4 3.4-8.2 2-9.6 2-14.3 3.3-.2.1.2.3 6.4.6 2.8.2h6.8l12.6 1 3.3 2 1.9 2.7-.3 2-5.1 2.6-6.8-1.6-16-3.8-5.4-1.3h-.8v.4l4.6 4.5 8.3 7.5L89 80.1l.5 2.4-1.3 2-1.4-.2-9.2-7-3.6-3-8-6.8h-.5v.7l1.8 2.7 9.8 14.7.5 4.5-.7 1.4-2.6 1-2.7-.6-5.8-8-6-9-4.7-8.2-.5.4-2.9 30.2-1.3 1.5-3 1.2-2.5-2-1.4-3 1.4-6.2 1.6-8 1.3-6.4 1.2-7.9.7-2.6v-.2H49L43 72l-9 12.3-7.2 7.6-1.7.7-3-1.5.3-2.8L24 86l10-12.8 6-7.9 4-4.6-.1-.5h-.3L17.2 77.4l-4.7.6-2-2 .2-3 1-1 8-5.5Z"/></svg>',
      openai: '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="12" cy="12" r="2.5"/><circle cx="12" cy="5" r="2"/><circle cx="17.5" cy="8" r="2"/><circle cx="17.5" cy="16" r="2"/><circle cx="12" cy="19" r="2"/><circle cx="6.5" cy="16" r="2"/><circle cx="6.5" cy="8" r="2"/></svg>',
    };
    const brandSVG = (provider) => BRAND_ICONS[provider] || BRAND_ICONS.openai;

    /* ─── Chats store ─── */
    const Chats = {
      indexKey: 'outpost_chat_index',
      currentKey: 'outpost_current_chat',
      key: (id) => 'outpost_chat_' + id,
      index: () => JSON.parse(localStorage.getItem(Chats.indexKey) || '[]'),
      saveIndex: (idx) => localStorage.setItem(Chats.indexKey, JSON.stringify(idx)),
      get: (id) => {
        const raw = localStorage.getItem(Chats.key(id));
        return raw ? JSON.parse(raw) : null;
      },
      save: (chat) => localStorage.setItem(Chats.key(chat.id), JSON.stringify(chat)),
      remove: (id) => {
        localStorage.removeItem(Chats.key(id));
        Chats.saveIndex(Chats.index().filter((c) => c.id !== id));
      },
      currentId: () => localStorage.getItem(Chats.currentKey),
      setCurrentId: (id) => {
        if (id) localStorage.setItem(Chats.currentKey, id);
        else localStorage.removeItem(Chats.currentKey);
      },
    };

    function newChatId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    }

    function newChat({ activate = true } = {}) {
      const id = newChatId();
      const now = new Date().toISOString();
      const chat = { id, title: 'Nueva conversación', createdAt: now, updatedAt: now, messages: [] };
      Chats.save(chat);
      const idx = Chats.index();
      idx.unshift({ id, title: chat.title, updatedAt: now });
      Chats.saveIndex(idx);
      if (activate) Chats.setCurrentId(id);
      return chat;
    }

    function getCurrentChat() {
      const id = Chats.currentId();
      if (id) {
        const c = Chats.get(id);
        if (c) return c;
      }
      const idx = Chats.index();
      if (idx.length) {
        const c = Chats.get(idx[0].id);
        if (c) { Chats.setCurrentId(c.id); return c; }
      }
      return newChat();
    }

    function persistCurrentChat(chat) {
      chat.updatedAt = new Date().toISOString();
      Chats.save(chat);
      const idx = Chats.index();
      const meta = idx.find((c) => c.id === chat.id);
      if (meta) {
        meta.title = chat.title;
        meta.updatedAt = chat.updatedAt;
      } else {
        idx.unshift({ id: chat.id, title: chat.title, updatedAt: chat.updatedAt });
      }
      idx.sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));
      Chats.saveIndex(idx);
      renderChatList();
    }

    function deriveTitle(prompt) {
      const trimmed = String(prompt || '').trim().replace(/\s+/g, ' ');
      if (!trimmed) return 'Nueva conversación';
      return trimmed.length > 42 ? trimmed.slice(0, 42) + '…' : trimmed;
    }

    const getHistory = () => getCurrentChat().messages;
    const setHistory = (messages) => {
      const chat = getCurrentChat();
      chat.messages = messages;
      if ((chat.title === 'Nueva conversación' || !chat.title) && messages.length) {
        const firstUser = messages.find((m) => m.role === 'user');
        if (firstUser) chat.title = deriveTitle(firstUser.content);
      }
      persistCurrentChat(chat);
    };

    function migrateLegacyHistory() {
      let migrated = false;
      for (const provider of ['openai', 'anthropic']) {
        const old = localStorage.getItem('tunnel_hist_' + provider);
        if (!old) continue;
        try {
          const arr = JSON.parse(old);
          if (Array.isArray(arr) && arr.length) {
            const id = newChatId();
            const now = new Date().toISOString();
            const firstUser = arr.find((m) => m.role === 'user');
            const title = firstUser ? deriveTitle(firstUser.content) : 'Conversación ' + provider;
            const chat = { id, title, createdAt: now, updatedAt: now, messages: arr };
            Chats.save(chat);
            const idx = Chats.index();
            idx.unshift({ id, title, updatedAt: now });
            Chats.saveIndex(idx);
            migrated = true;
          }
        } catch {}
        localStorage.removeItem('tunnel_hist_' + provider);
      }
      return migrated;
    }

    /* ─── Markdown ─── */
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function renderMarkdown(text) {
      if (!text) return '';
      const codeBlocks = [];
      const inlineCodes = [];

      let s = String(text).replace(/```([a-zA-Z0-9_+\-]*)\n?([\s\S]*?)```/g, (_, lang, code) => {
        codeBlocks.push({ lang, code });
        return '␀CB' + (codeBlocks.length - 1) + '␀';
      });

      s = s.replace(/`([^`\n]+)`/g, (_, code) => {
        inlineCodes.push(code);
        return '␀IC' + (inlineCodes.length - 1) + '␀';
      });

      s = escapeHtml(s);

      s = s.replace(/^(#{1,6})\s+(.+?)\s*#*\s*$/gm, (_, h, content) => {
        const lvl = h.length;
        return '<h' + lvl + '>' + content + '</h' + lvl + '>';
      });

      s = s.replace(/^---+$|^\*\*\*+$/gm, '<hr>');

      s = s.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/__([^_\n]+?)__/g, '<strong>$1</strong>');
      s = s.replace(/(^|[\s(])\*([^*\n]+?)\*(?=[\s.,;:!?)]|$)/g, '$1<em>$2</em>');
      s = s.replace(/(^|[\s(])_([^_\n]+?)_(?=[\s.,;:!?)]|$)/g, '$1<em>$2</em>');

      s = s.replace(/\[([^\]\n]+)\]\(([^)\n]+)\)/g, (m, txt, url) => {
        if (!/^(https?:\/\/|mailto:|\/)/i.test(url)) return m;
        return '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' + txt + '</a>';
      });

      const lines = s.split('\n');
      const out = [];
      let listType = null;
      const closeList = () => {
        if (listType) out.push('</' + listType + '>');
        listType = null;
      };
      for (const line of lines) {
        const ul = line.match(/^\s*[-*+]\s+(.+)$/);
        const ol = line.match(/^\s*\d+\.\s+(.+)$/);
        if (ul) {
          if (listType !== 'ul') { closeList(); out.push('<ul>'); listType = 'ul'; }
          out.push('<li>' + ul[1] + '</li>');
        } else if (ol) {
          if (listType !== 'ol') { closeList(); out.push('<ol>'); listType = 'ol'; }
          out.push('<li>' + ol[1] + '</li>');
        } else {
          closeList();
          out.push(line);
        }
      }
      closeList();
      s = out.join('\n');

      s = s.replace(/^&gt;\s+(.+)$/gm, '<blockquote>$1</blockquote>');

      s = s.split(/\n{2,}/).map((block) => {
        block = block.trim();
        if (!block) return '';
        if (/^<(h[1-6]|ul|ol|pre|blockquote|hr)/i.test(block)) return block;
        if (/^␀CB\d+␀$/.test(block)) return block;
        return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
      }).filter(Boolean).join('\n');

      s = s.replace(/␀IC(\d+)␀/g, (_, idx) =>
        '<code class="md-inline">' + escapeHtml(inlineCodes[Number(idx)]) + '</code>');

      s = s.replace(/␀CB(\d+)␀/g, (_, idx) => {
        const { lang, code } = codeBlocks[Number(idx)];
        const langAttr = lang ? ' data-lang="' + escapeHtml(lang) + '"' : '';
        return '<pre class="md-code"' + langAttr + '><code>' + escapeHtml(code) + '</code></pre>';
      });

      return s;
    }

    /* ─── Render ─── */
    function renderHistory() {
      const history = getHistory();
      messagesEl.innerHTML = '';
      if (!history.length) {
        messagesEl.appendChild(emptyStateNode());
        return;
      }
      for (const m of history) {
        messagesEl.appendChild(messageNode(m.role, m.content));
      }
      requestAnimationFrame(() => {
        conversationEl.scrollTop = conversationEl.scrollHeight;
      });
    }

    function emptyStateNode() {
      const wrap = document.createElement('div');
      wrap.className = 'empty';
      const provider = providerSel.value;
      wrap.innerHTML = `
        <div class="logo-circle">${brandSVG(provider)}</div>
        <h2>¿En qué te ayudo hoy?</h2>
        <p>Conversación con ${provider} · ${modelSel.value || 'modelo por defecto'}</p>
      `;
      return wrap;
    }

    function messageNode(role, content) {
      const wrap = document.createElement('div');
      wrap.className = 'msg msg-' + role;
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      if (role === 'user') {
        avatar.textContent = 'You';
      } else if (role === 'assistant') {
        avatar.innerHTML = brandSVG(providerSel.value);
      } else {
        avatar.textContent = '!';
      }
      const body = document.createElement('div');
      body.className = 'msg-body';
      if (role === 'assistant') {
        body.classList.add('md');
        body.innerHTML = renderMarkdown(content);
      } else {
        body.textContent = content;
      }
      wrap.appendChild(avatar);
      wrap.appendChild(body);
      return wrap;
    }

    function updateProviderMark() {
      $('providerMark').innerHTML = brandSVG(providerSel.value);
    }

    function typingNode() {
      const wrap = document.createElement('div');
      wrap.className = 'msg msg-assistant msg-typing';
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.innerHTML = brandSVG(providerSel.value);
      const body = document.createElement('div');
      body.className = 'msg-body typing-dots';
      body.innerHTML = '<span></span><span></span><span></span>';
      wrap.appendChild(avatar);
      wrap.appendChild(body);
      return wrap;
    }

    /* ─── Models ─── */
    const getCachedModels = (p) =>
      JSON.parse(localStorage.getItem('tunnel_models_' + p) || 'null');
    const setCachedModels = (p, ids) =>
      localStorage.setItem('tunnel_models_' + p, JSON.stringify(ids));

    function populateModelSelect() {
      const provider = providerSel.value;
      const cached = getCachedModels(provider);
      const ids = (cached && cached.length) ? [...cached] : [DEFAULT_MODELS[provider]];
      const current = localStorage.getItem('tunnel_model_' + provider) || DEFAULT_MODELS[provider];
      modelSel.innerHTML = '';
      if (!ids.includes(current)) ids.unshift(current);
      for (const id of ids) {
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = id;
        if (id === current) opt.selected = true;
        modelSel.appendChild(opt);
      }
    }

    async function fetchModels() {
      const token = tokenInput.value.trim();
      if (!token) { setStatus('falta el token en settings', 'error'); openDrawer(); return; }
      const provider = providerSel.value;
      refreshBtn.disabled = true;
      setStatus('cargando modelos...');
      try {
        const r = await fetch('/api/proxy', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: MODELS_URL[provider], method: 'GET' }),
        });
        const data = await r.json();
        if (!r.ok || !data.response) {
          setStatus('error: ' + (data.error || 'HTTP ' + r.status), 'error');
          return;
        }
        const items = data.response.body && data.response.body.data;
        if (!Array.isArray(items)) {
          setStatus('respuesta inesperada', 'error');
          return;
        }
        const ids = items.map((m) => m.id).filter(Boolean).sort();
        setCachedModels(provider, ids);
        populateModelSelect();
        setStatus(ids.length + ' modelos disponibles');
      } catch (e) {
        setStatus('fallo: ' + e.message, 'error');
      } finally {
        refreshBtn.disabled = false;
      }
    }

    /* ─── Status ─── */
    function setStatus(text, kind = '') {
      statusEl.textContent = text || '';
      statusEl.style.color = kind === 'error' ? 'var(--danger)' : '';
    }
    function statusFooter() {
      const parts = [providerSel.value, modelSel.value, maxTokensInput.value + ' tokens'];
      setStatus(parts.filter(Boolean).join(' · '));
    }

    /* ─── Send ─── */
    function buildRequest(history, prompt) {
      const provider = providerSel.value;
      const model = modelSel.value;
      const maxTokens = Number(maxTokensInput.value) || 2048;
      const messages = [...history, { role: 'user', content: prompt }];
      if (provider === 'openai') {
        return {
          url: 'https://api.openai.com/v1/chat/completions',
          body: { model, messages },
          extract: (r) => r.body.choices[0].message.content,
        };
      }
      return {
        url: 'https://api.anthropic.com/v1/messages',
        body: { model, max_tokens: maxTokens, messages },
        extract: (r) => r.body.content[0].text,
      };
    }

    async function send(prompt) {
      const token = tokenInput.value.trim();
      if (!token) {
        setStatus('falta el token en settings', 'error');
        openDrawer();
        return;
      }
      const history = getHistory();
      const newHistory = [...history, { role: 'user', content: prompt }];
      setHistory(newHistory);
      renderHistory();

      const typing = typingNode();
      messagesEl.appendChild(typing);
      conversationEl.scrollTop = conversationEl.scrollHeight;

      sendBtn.disabled = true;
      setStatus('pensando...');
      const t0 = Date.now();
      try {
        const req = buildRequest(history, prompt);
        const r = await fetch('/api/proxy', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: req.url, method: 'POST', body: req.body }),
        });
        const data = await r.json();
        if (!r.ok) {
          setStatus('HTTP ' + r.status + ': ' + (data.error || ''), 'error');
          appendInline('error', JSON.stringify(data, null, 2));
          return;
        }
        if (data.status !== 'done' || !data.response) {
          setStatus('status=' + data.status + ' ' + (data.message || data.error || ''), 'error');
          return;
        }
        let text;
        try { text = req.extract(data.response); }
        catch (e) {
          setStatus('parse error: ' + e.message, 'error');
          appendInline('error', JSON.stringify(data.response, null, 2));
          return;
        }
        setHistory([...newHistory, { role: 'assistant', content: text }]);
        renderHistory();
        setStatus('ok · ' + (Date.now() - t0) + ' ms');
      } catch (e) {
        setStatus('fallo: ' + e.message, 'error');
      } finally {
        if (typing.isConnected) typing.remove();
        sendBtn.disabled = false;
      }
    }

    function appendInline(kind, text) {
      const node = messageNode(kind, text);
      messagesEl.appendChild(node);
      conversationEl.scrollTop = conversationEl.scrollHeight;
    }

    /* ─── Drawer ─── */
    function openDrawer() {
      drawerEl.classList.add('open');
      overlayEl.classList.add('open');
      drawerEl.setAttribute('aria-hidden', 'false');
    }
    function closeDrawer() {
      drawerEl.classList.remove('open');
      overlayEl.classList.remove('open');
      drawerEl.setAttribute('aria-hidden', 'true');
    }

    /* ─── Sidebar (chat list) ─── */
    const sidebarEl        = $('sidebar');
    const sidebarOverlayEl = $('sidebarOverlay');
    const chatListEl       = $('chatList');

    function openSidebar() {
      sidebarEl.classList.add('open');
      sidebarOverlayEl.classList.add('open');
    }
    function closeSidebar() {
      sidebarEl.classList.remove('open');
      sidebarOverlayEl.classList.remove('open');
    }

    function renderChatList() {
      const idx = Chats.index();
      const currentId = Chats.currentId();
      chatListEl.innerHTML = '';
      if (!idx.length) {
        const e = document.createElement('div');
        e.className = 'chat-empty';
        e.textContent = 'Aún no hay conversaciones';
        chatListEl.appendChild(e);
        return;
      }
      for (const c of idx) {
        const item = document.createElement('div');
        item.className = 'chat-item' + (c.id === currentId ? ' active' : '');
        item.dataset.id = c.id;

        const title = document.createElement('span');
        title.className = 'chat-item-title';
        title.textContent = c.title || 'Sin título';

        const del = document.createElement('button');
        del.className = 'chat-delete';
        del.setAttribute('aria-label', 'Borrar conversación');
        del.title = 'Borrar';
        del.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

        item.appendChild(title);
        item.appendChild(del);

        item.addEventListener('click', () => switchToChat(c.id));
        del.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteChat(c.id);
        });
        chatListEl.appendChild(item);
      }
    }

    function switchToChat(id) {
      if (Chats.currentId() === id) {
        closeSidebar();
        return;
      }
      Chats.setCurrentId(id);
      renderChatList();
      renderHistory();
      closeSidebar();
      inputEl.focus();
    }

    function deleteChat(id) {
      const meta = Chats.index().find((c) => c.id === id);
      const label = meta ? '"' + (meta.title || 'Sin título') + '"' : 'esta conversación';
      if (!confirm('¿Borrar ' + label + '?')) return;
      Chats.remove(id);
      if (Chats.currentId() === id) {
        const remaining = Chats.index();
        if (remaining.length) {
          Chats.setCurrentId(remaining[0].id);
        } else {
          newChat();
        }
      }
      renderChatList();
      renderHistory();
    }

    /* ─── Auto-resize textarea ─── */
    function autoresize() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 220) + 'px';
    }

    /* ─── Events ─── */
    formEl.addEventListener('submit', (e) => {
      e.preventDefault();
      const prompt = inputEl.value.trim();
      if (!prompt) return;
      inputEl.value = '';
      autoresize();
      send(prompt);
    });

    inputEl.addEventListener('input', autoresize);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        formEl.requestSubmit();
      }
    });

    $('clear').addEventListener('click', () => {
      const chat = getCurrentChat();
      if (!chat.messages.length) {
        closeDrawer();
        return;
      }
      if (confirm('¿Borrar mensajes de "' + chat.title + '"?')) {
        chat.messages = [];
        chat.title = 'Nueva conversación';
        persistCurrentChat(chat);
        renderHistory();
        statusFooter();
        closeDrawer();
      }
    });

    $('newChatBtn').addEventListener('click', () => {
      newChat();
      renderChatList();
      renderHistory();
      closeSidebar();
      inputEl.focus();
    });

    $('menuToggle').addEventListener('click', () => {
      if (sidebarEl.classList.contains('open')) closeSidebar();
      else openSidebar();
    });
    sidebarOverlayEl.addEventListener('click', closeSidebar);

    tokenInput.addEventListener('change', () => {
      localStorage.setItem('tunnel_token', tokenInput.value.trim());
    });
    modelSel.addEventListener('change', () => {
      localStorage.setItem('tunnel_model_' + providerSel.value, modelSel.value);
      statusFooter();
    });
    maxTokensInput.addEventListener('change', () => {
      localStorage.setItem('tunnel_max_tokens', maxTokensInput.value);
      statusFooter();
    });
    providerSel.addEventListener('change', () => {
      localStorage.setItem('tunnel_provider', providerSel.value);
      populateModelSelect();
      updateProviderMark();
      renderHistory();
      statusFooter();
    });
    refreshBtn.addEventListener('click', fetchModels);
    $('settingsToggleSidebar').addEventListener('click', openDrawer);
    $('settingsClose').addEventListener('click', closeDrawer);
    overlayEl.addEventListener('click', closeDrawer);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeDrawer();
        closeSidebar();
      }
    });

    /* ─── Init ─── */
    (function init() {
      tokenInput.value     = localStorage.getItem('tunnel_token') || '';
      providerSel.value    = localStorage.getItem('tunnel_provider') || 'openai';
      maxTokensInput.value = localStorage.getItem('tunnel_max_tokens') || '2048';
      migrateLegacyHistory();
      populateModelSelect();
      updateProviderMark();
      renderChatList();
      renderHistory();
      statusFooter();
      autoresize();
      inputEl.focus();
    })();
  </script>
</body>
</html>
