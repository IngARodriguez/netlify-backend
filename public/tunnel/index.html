<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c96442" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Outpost" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <title>Outpost Chat</title>
  <link rel="stylesheet" href="style.css" />
  <script type="module" src="js/app.js"></script>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" id="newChatBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>Nueva conversación</span>
      </button>
    </div>
    <div class="chat-list" id="chatList"></div>
    <div class="sidebar-footer">
      <button type="button" class="ghost-btn" id="settingsToggleSidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </button>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main">
    <header class="topbar">
      <button class="icon-btn menu-toggle" id="menuToggle" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="brand">
        <span class="provider-mark" id="providerMark"></span>
        <span>Outpost Chat</span>
      </div>
      <div class="header-controls">
        <select id="provider" class="select-min" aria-label="Provider">
          <option value="openai">OpenAI</option>
          <option value="anthropic">Anthropic</option>
        </select>
        <select id="model" class="select-min" aria-label="Model"></select>
      </div>
    </header>

    <main class="conversation" id="conversation">
      <div class="conv-inner" id="messages"></div>
    </main>

    <div class="composer-wrap">
      <div class="attach-bar" id="attachBar" hidden></div>
      <form id="form" class="composer">
        <input id="fileInput" type="file" multiple accept="image/png,image/jpeg,image/gif,image/webp,application/pdf,.txt,.md,.json,.csv,.js,.ts,.tsx,.jsx,.py,.css,.html,.xml,.yml,.yaml,.sh,.log,.toml,.go,.rb,.rs,.java,.c,.cpp,.h,.sql" hidden />
        <textarea id="input" rows="1" placeholder="Mensaje a Outpost..."></textarea>
        <div class="composer-actions">
          <button type="button" id="attachBtn" class="composer-action attach-btn" aria-label="Adjuntar archivo" title="Adjuntar archivo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05 12.25 20.24a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <span class="composer-spacer"></span>
          <button type="submit" id="send" class="send-btn" aria-label="Enviar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          </button>
        </div>
      </form>
      <div class="composer-footer status-idle" id="statusFooter">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="status"></span>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay"></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-header">
      <h3>Settings</h3>
      <button class="icon-btn" id="settingsClose" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="drawer-body">
      <label>
        <span>JOBS_CLIENT_TOKEN</span>
        <input id="token" type="password" autocomplete="off" placeholder="admin" />
      </label>
      <label class="slider-field">
        <div class="slider-header">
          <span>max tokens</span>
          <span class="slider-value" id="maxTokensValue">2048</span>
        </div>
        <input id="maxTokens" type="range" min="256" max="8192" step="256" value="2048" />
        <div class="slider-meta">
          <span>256</span>
          <span id="maxTokensMax">8192</span>
        </div>
      </label>
      <button type="button" id="refreshModels" class="ghost-btn">Refrescar lista de modelos</button>
      <button type="button" id="clear" class="ghost-btn danger">Borrar conversación actual</button>
    </div>
  </aside>
</body>
</html>
