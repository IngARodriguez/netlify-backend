<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Mensajes recibidos</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { border: 1px solid #ddd; padding: .5rem; text-align: left; vertical-align: top; font-size: .9rem; }
    th { background: #f5f5f5; }
    pre { background: #111; color: #0f0; padding: .5rem; border-radius: 4px; margin: 0; font-size: .8rem; max-width: 500px; overflow:auto; }
    .controls { display: flex; gap: .5rem; align-items: center; }
    button { padding: .5rem 1rem; cursor: pointer; }
    .count { font-weight: bold; }
    .empty { color: #888; font-style: italic; padding: 2rem; text-align: center; }
  </style>
</head>
<body>
  <h1>Mensajes recibidos</h1>
  <div class="controls">
    <button id="refresh">↻ Refrescar</button>
    <button id="clear">🗑 Borrar todos</button>
    <label><input type="checkbox" id="auto" /> Auto-refrescar (5s)</label>
    <span class="count" id="count">—</span>
  </div>
  <div id="content"></div>

  <script>
    const content = document.getElementById("content");
    const countEl = document.getElementById("count");

    async function load() {
      try {
        const res = await fetch("/api/messages");
        const data = await res.json();
        countEl.textContent = `Total: ${data.count}`;
        if (!data.count) {
          content.innerHTML = '<div class="empty">No hay mensajes aún. Envía un POST a /api/webhook.</div>';
          return;
        }
        const rows = data.messages.map((m) => `
          <tr>
            <td>${m.receivedAt || ""}</td>
            <td><code>${m.id || ""}</code></td>
            <td>${m.ip || ""}</td>
            <td><pre>${escapeHtml(JSON.stringify(m.payload, null, 2))}</pre></td>
          </tr>
        `).join("");
        content.innerHTML = `
          <table>
            <thead><tr><th>Recibido</th><th>ID</th><th>IP</th><th>Payload</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      } catch (err) {
        content.innerHTML = `<div class="empty">Error: ${err.message}</div>`;
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    document.getElementById("refresh").addEventListener("click", load);
    document.getElementById("clear").addEventListener("click", async () => {
      if (!confirm("¿Borrar TODOS los mensajes?")) return;
      await fetch("/api/messages", { method: "DELETE" });
      load();
    });

    let timer;
    document.getElementById("auto").addEventListener("change", (e) => {
      clearInterval(timer);
      if (e.target.checked) timer = setInterval(load, 5000);
    });

    load();
  </script>
</body>
</html>
